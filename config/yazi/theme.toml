# Gruvbox Dark Hard
# Background: #1d2021 (Hard variant — matches Kitty theme)

[manager]
cwd = { fg = "#fabd2f" }

hovered         = { reversed = true }
previewed       = { fg = "#83a598" }
count_copied    = { fg = "#b8bb26", bold = true }
count_cut       = { fg = "#fb4934", bold = true }
count_selected  = { fg = "#fabd2f", bold = true }
find_keyword    = { fg = "#fabd2f", bold = true, italic = true, underline = true }
find_position   = { fg = "#fe8019", bold = true, italic = true }
marker_copied   = { fg = "#b8bb26", bg = "#b8bb26" }
marker_cut      = { fg = "#fb4934", bg = "#fb4934" }
marker_marked   = { fg = "#fabd2f", bg = "#fabd2f" }
marker_selected = { fg = "#83a598", bg = "#83a598" }

[status]
separator_open  = ""
separator_close = ""
separator_style = { fg = "#3c3836", bg = "#3c3836" }

mode_normal = { fg = "#1d2021", bg = "#a89984", bold = true }
mode_select = { fg = "#1d2021", bg = "#b8bb26", bold = true }
mode_unset  = { fg = "#1d2021", bg = "#fb4934", bold = true }

progress_label  = { fg = "#ebdbb2", bold = true }
progress_normal = { fg = "#458588", bg = "#3c3836" }
progress_error  = { fg = "#fb4934", bg = "#3c3836" }

permissions_t = { fg = "#b8bb26" }
permissions_r = { fg = "#fabd2f" }
permissions_w = { fg = "#fb4934" }
permissions_x = { fg = "#8ec07c" }
permissions_s = { fg = "#d3869b" }

[input]
border   = { fg = "#83a598" }
title    = { fg = "#fabd2f" }
value    = { fg = "#ebdbb2" }
selected = { reversed = true }

[select]
border   = { fg = "#83a598" }
active   = { fg = "#fabd2f" }
inactive = { fg = "#a89984" }

[tasks]
border  = { fg = "#83a598" }
title   = { fg = "#fabd2f" }
hovered = { underline = true }

[which]
mask            = { bg = "#1d2021" }
cand            = { fg = "#8ec07c" }
rest            = { fg = "#928374" }
desc            = { fg = "#d3869b" }
separator       = "  "
separator_style = { fg = "#3c3836" }

[help]
on      = { fg = "#8ec07c" }
run     = { fg = "#83a598" }
desc    = { fg = "#a89984" }
hovered = { bg = "#3c3836", bold = true }
footer  = { fg = "#1d2021", bg = "#a89984" }

[notify]
title_info  = { fg = "#b8bb26" }
title_warn  = { fg = "#fabd2f" }
title_error = { fg = "#fb4934" }

[filetype]
rules = [
  { mime = "image/*",                      fg = "#fabd2f" },
  { mime = "video/*",                      fg = "#d3869b" },
  { mime = "audio/*",                      fg = "#d3869b" },
  { mime = "application/pdf",              fg = "#fb4934" },
  { mime = "application/zip",              fg = "#fe8019" },
  { mime = "application/x-tar",            fg = "#fe8019" },
  { mime = "application/x-bzip2",          fg = "#fe8019" },
  { mime = "application/x-7z-compressed",  fg = "#fe8019" },
  { mime = "application/x-rar",            fg = "#fe8019" },
  { mime = "application/gzip",             fg = "#fe8019" },
  { name = "*/",                            fg = "#83a598", bold = true },
  { name = "*", is = "exec",               fg = "#b8bb26" },
  { name = "*",                            fg = "#ebdbb2" },
]
